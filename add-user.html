<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Add User - Philtech GMA</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>

    <link rel="stylesheet" href="css/global.css">
    <link rel="stylesheet" href="css/add-employee.css">
</head>
<body>

<header class="top-bar">
    <div class="logo-section">
        <img src="assets/images/logo.png" class="logo" alt="Logo">
        <h1>Philtech GMA</h1>
    </div>

    <button class="back-btn" onclick="goBack()">←</button>
</header>

<main class="form-wrapper">

    <div class="form-card">

        <div class="avatar-circle">👤</div>

        <h2>Add User</h2>

        <form id="userForm">

            <div class="form-grid">

                <input type="email" id="email" placeholder="Email" required>

                <input type="text" id="username" placeholder="Username (optional)">

                <input type="password" id="password" placeholder="Password" required>

                <div class="dropdown-container">
                    <input type="text" id="role" placeholder="Role" readonly required>
                    <div class="dropdown-menu" id="roleDropdownMenu">
                        <div onclick="selectRole('superadmin')">Superadmin</div>
                        <div onclick="selectRole('admin')">Admin (Accountant)</div>
                        <div onclick="selectRole('employee')">Employee</div>
                    </div>
                </div>

                <div class="dropdown-container">
                    <input type="text" id="status" placeholder="Status" readonly required>
                    <div class="dropdown-menu" id="statusDropdownMenu">
                        <div onclick="selectStatus('Active')">Active</div>
                        <div onclick="selectStatus('Inactive')">Inactive</div>
                    </div>
                </div>

                <!-- Employee details (shown only when role is employee) -->
                <div id="employeeFields" style="display: none; grid-column: span 2;">
                    <hr style="margin: 20px 0; border-color: #e8d79f;">
                    <h3 style="color: white; margin-bottom: 20px;">Employee Details</h3>
                    
                    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px;">
                        <input type="text" id="fullName" placeholder="Full Name">
                        <input type="text" id="position" placeholder="Position">
                        <input type="number" id="salary" placeholder="Base Salary">
                        <input type="text" id="employmentType" placeholder="Employment Type">
                    </div>
                </div>

            </div>

            <div class="form-buttons">
                <button type="submit" class="save-btn">Save User</button>
                <button type="button" class="cancel-btn" onclick="goBack()">Cancel</button>
            </div>

        </form>

    </div>

</main>
