<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Philtech GMA | User Management</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <link rel="stylesheet" href="css/global.css" />
  <link rel="stylesheet" href="css/user-mgmt.css" />
</head>
<body>

<header class="top-bar">
  <div class="logo-section">
    <img src="assets/images/logo.png" class="logo" alt="Logo">
    <h1>Philtech GMA</h1>
  </div>
</header>

<div class="layout">

    <!-- SIDEBAR -->
    <aside class="sidebar">
        <h2 class="sidebar-title">💰 Payroll</h2>

        <ul>
      <li onclick="go('dashboardSadmin.html')">📊 Dashboard</li>
<li onclick="go('employeesSadmin.html')">👥 Employees</li>
<li onclick="go('attendanceSadmin.html')">📝 Attendance</li>
<li onclick="go('payrollSadmin.html')">🧮 Payroll</li>
<li onclick="go('report.html')">📑 Report</li>
<li onclick="go('user-mgmt.html')">👤 User Mgmt.</li>
<li onclick="go('settingsSadmin.html')">⚙ Settings</li>
<li onclick="logout()">🚪 Logout</li>
    </ul>
    </aside>

  <!-- CONTENT -->
  <main class="content">

    <div class="page-head">
      <div class="title">
        <span class="title-icon">👥</span>
        <h2>Employees Management</h2>
      </div>

      <button class="add-btn" onclick="addUser()">
        + Add User
      </button>
    </div>

    <!-- TABLE CARD -->
    <section class="table-card">
      <div class="table-watermark"></div>

      <table class="user-table">
        <thead>
          <tr>
            <th>Username</th>
            <th>Role</th>
            <th>Status</th>
            <th>Action</th>
          </tr>
        </thead>

        <tbody id="userTableBody">
          <tr>
            <td colspan="4" style="text-align:center; padding:20px;">
              Loading users...
            </td>
          </tr>
        </tbody>
      </table>

      <div class="pagination">
        ◀ 1–6 OF 30 ▶
      </div>

    </section>

  </main>
</div>
<script src="js/database.js"></script>
<script src="js/navigation.js"></script>
<script src="js/user-mgmt.js"></script>
</body>
</html>
