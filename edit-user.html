<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Edit User - Philtech GMA</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="stylesheet" href="css/global.css">
    <link rel="stylesheet" href="css/add-employee.css">
</head>
<body>

<header class="top-bar">
    <div class="logo-section">
        <img src="assets/images/logo.png" class="logo" alt="Logo">
        <h1>Philtech GMA</h1>
    </div>

    <button class="back-btn" onclick="goBack()">←</button>
</header>

<main class="form-wrapper">

    <div class="form-card">

        <div class="avatar-circle">✏️</div>

        <h2>Edit User</h2>

        <form id="userForm">

            <div class="form-grid">

                <input type="hidden" id="userId">

                <input type="text" id="username" placeholder="Username" required>

                <input type="password" id="password" placeholder="Password" required>

                <div class="dropdown-container">
                    <input type="text" id="role" placeholder="Role" readonly required>
                    <div class="dropdown-menu" id="roleDropdownMenu">
                        <div onclick="selectRole('Administrator')">Administrator</div>
                        <div onclick="selectRole('Superadmin')">Superadmin</div>
                        <div onclick="selectRole('Payroll Staff')">Payroll Staff</div>
                        <div onclick="selectRole('Teacher')">Teacher</div>
                        <div onclick="selectRole('Viewer')">Viewer</div>
                    </div>
                </div>

                <div class="dropdown-container">
                    <input type="text" id="status" placeholder="Status" readonly required>
                    <div class="dropdown-menu" id="statusDropdownMenu">
                        <div onclick="selectStatus('Active')">Active</div>
                        <div onclick="selectStatus('Inactive')">Inactive</div>
                    </div>
                </div>

            </div>

            <div class="form-buttons">
                <button type="submit" class="save-btn">Update</button>
                <button type="button" class="cancel-btn" onclick="goBack()">Cancel</button>
            </div>

        </form>

    </div>

</main>
<script src="js/database.js"></script>
<script src="js/navigation.js"></script>
<script src="js/edit-user.js"></script>
</body>
</html>
