<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Philtech GMA | Settings</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <link rel="stylesheet" href="css/global.css" />
  <link rel="stylesheet" href="css/settings.css" />
</head>
<body>

<header class="top-bar">
  <div class="logo-section">
    <img src="assets/images/logo.png" class="logo" alt="Logo">
    <h1>Philtech GMA</h1>
  </div>
</header>

<div class="layout">

  <!-- SIDEBAR -->
  <aside class="sidebar">
    <h2 class="sidebar-title">💰 Payroll</h2>

    <ul>
      <li onclick="go('dashboardSadmin.html')">📊 Dashboard</li>
<li onclick="go('employees.html')">👥 Employees</li>
<li onclick="go('attendance.html')">📝 Attendance</li>
<li onclick="go('payroll.html')">🧮 Payroll</li>
<li onclick="go('settings.html')">⚙ Settings</li>
<li onclick="logout()">🚪 Logout</li>
    </ul>
  </aside>

  <!-- CONTENT -->
  <main class="content">

    <div class="page-head">
      <div class="title">
        <span class="title-icon">⚙</span>
        <h2>Settings</h2>
      </div>
    </div>

    <!-- SETTINGS CARD -->
    <section class="settings-card">
      <div class="settings-watermark"></div>

      <div class="setting-item" onclick="selectSetting('system')">
        SYSTEM CONFIGURATION
      </div>
      <div class="line"></div>

      <div class="setting-item" onclick="selectSetting('tax')">
        TAX SETTINGS
      </div>
      <div class="line"></div>

      <div class="setting-item" onclick="selectSetting('deduction')">
        DEDUCTION SETTINGS
      </div>
      <div class="line"></div>

      <div class="setting-item" onclick="selectSetting('company')">
        COMPANY SETTINGS
      </div>
      <div class="line"></div>

      <button class="save-btn" id="saveBtn">Save Settings</button>
    </section>

  </main>
</div>
<script src="js/database.js"></script>
<script src="js/navigation.js"></script>
<script src="js/settings.js"></script>
</body>
</html>
