<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>View Employee - Philtech GMA</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="stylesheet" href="css/global.css">
    <link rel="stylesheet" href="css/view-employee.css">
</head>
<body>

<header class="top-bar">
    <div class="logo-section">
        <img src="assets/images/logo.png" class="logo" alt="Logo">
        <h1>Philtech GMA</h1>
    </div>

    <button class="back-btn" onclick="go('employeesSadmin.html')">←</button>
</header>

<main class="view-wrapper">

    <div class="view-card">

        <div class="avatar-circle">👤</div>

        <h2>Employee Details</h2>

        <div class="detail-grid" id="employeeDetails">
            <!-- Employee details will be loaded here -->
            <div class="loading">Loading...</div>
        </div>

        <div class="form-buttons">
            <button type="button" class="edit-btn" id="editBtn">✏️ Edit</button>
            <button type="button" class="cancel-btn" onclick="go('employeesSadmin.html')">Back</button>
        </div>

    </div>

</main>
<script src="js/database.js"></script>
<script src="js/navigation.js"></script>
<script src="js/view-employeeSadmin.js"></script>
</body>
</html>
