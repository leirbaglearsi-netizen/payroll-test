<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Philtech GMA | Report</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <link rel="stylesheet" href="css/global.css" />
  <link rel="stylesheet" href="css/report.css" />
</head>
<body>

<header class="top-bar">
  <div class="logo-section">
    <img src="assets/images/logo.png" class="logo" alt="Logo">
    <h1>Philtech GMA</h1>
  </div>
</header>

<div class="layout">

  <!-- SIDEBAR -->
  <aside class="sidebar">
    <h2 class="sidebar-title">💰 Payroll</h2>

    <ul>
      <li onclick="go('dashboardSadmin.html')">📊 Dashboard</li>
<li onclick="go('employeesSadmin.html')">👥 Employees</li>
<li onclick="go('attendanceSadmin.html')">📝 Attendance</li>
<li onclick="go('payrollSadmin.html')">🧮 Payroll</li>
<li onclick="go('report.html')">📑 Report</li>
<li onclick="go('user-mgmt.html')">👤 User Mgmt.</li>
<li onclick="go('settingsSadmin.html')">⚙ Settings</li>
<li onclick="logout()">🚪 Logout</li>
    </ul>
  </aside>

  <!-- CONTENT -->
  <main class="content">

    <div class="page-head">
      <div class="title">
        <span class="title-icon">📄</span>
        <h2>Report</h2>
      </div>

      <div class="filter-btn">
        Filter by Date ▼
      </div>
    </div>

    <!-- REPORT CARD -->
    <section class="report-card">
      <div class="report-watermark"></div>

      <h3 class="report-title">Report Available</h3>

      <div class="report-item" onclick="generateMonthlyPayrollReport()">
        <span class="icon">🧮</span>
        <span class="text">Monthly Payroll Salary</span>
      </div>
      <div class="separator"></div>

      <div class="report-item" onclick="generateEmployeeSalaryReport()">
        <span class="icon">👥</span>
        <span class="text">Employee Salary Report</span>
      </div>
      <div class="separator"></div>

      <div class="report-item" onclick="generateDeductionSummary()">
        <span class="icon">🧾</span>
        <span class="text">Deduction Summary</span>
      </div>
      <div class="separator"></div>

      <div class="report-item" onclick="generateAttendanceReport()">
        <span class="icon">⏰</span>
        <span class="text">Attendance Report</span>
      </div>

    </section>

    <!-- BOTTOM BUTTONS -->
    <div class="bottom-actions">
      <button class="action-btn" onclick="exportToPDF()">📤 Export to PDF</button>
      <button class="action-btn" onclick="exportToExcel()">📊 Export to Excel</button>
      <button class="action-btn" onclick="generateReport()">Generate Report</button>
    </div>

  </main>
</div>
<script src="js/database.js"></script>
<script src="js/navigation.js"></script>
<script src="js/report.js"></script>
</body>
</html>
